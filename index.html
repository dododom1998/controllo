<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contatore Posto di Controllo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 10px;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
  }
  h2 { margin: 5px 0 10px 0; font-size: 20px; }
  
  /* Blocco Unico Targhe in alto */
  .top-tg-block {
    background: #2c3e50;
    border-radius: 14px;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    box-sizing: border-box;
  }
  .tg-side-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 25%;
  }
  .tg-center-display {
    width: 45%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .tg-label-num {
    font-size: 14px;
    color: #bbb;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
  }
  .tg-label-num span {
    font-size: 26px;
    font-weight: bold;
    color: white;
  }

  /* Griglia per le persone sottostante */
  .grid-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    flex-grow: 1;
  }
  
  .card {
    background: #222;
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
  }
  
  .card h3 { margin: 0; font-size: 14px; color: #bbb; }
  .num { font-size: 36px; font-weight: bold; margin: 2px 0; }
  
  .btn-container {
    display: flex;
    gap: 8px;
  }
  button {
    font-size: 18px;
    padding: 12px;
    border: 0;
    border-radius: 10px;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
  }
  .plus { background: #2ecc71; color: white; flex: 2; }
  .plus-sosta { background: #3498db; color: white; flex: 2; }
  .minus { background: #e74c3c; color: white; flex: 1; }
  
  /* Bottoni verticali per le targhe */
  .btn-tg-v {
    padding: 8px;
    font-size: 16px;
  }

  .footer {
    margin-top: 10px;
  }
  .summary { font-size: 15px; background: #000; padding: 10px; border-radius: 10px; word-wrap: break-word; margin-bottom: 8px; min-height: 20px; text-align: left; white-space: pre-line; }
  .action-btns { display: flex; gap: 10px; }
  .copy { background: #2980b9; color: white; flex: 1; font-size: 18px; padding: 14px; }
  .reset { background: #f39c12; color: white; flex: 1; font-size: 18px; padding: 14px; }
</style>
</head>
<body>

<h2>Posto di Controllo</h2>

<!-- BLOCCO UNICO TARGHE -->
<div class="top-tg-block">
  <!-- Lato Sinistro: Tasti Sosta (Azzurri) -->
  <div class="tg-side-btns">
    <button class="plus-sosta btn-tg-v" onclick="cambia('tgSosta',1)">+1 S</button>
    <button class="minus btn-tg-v" onclick="cambia('tgSosta',-1)">-1 S</button>
  </div>
  
  <!-- Centro: Visualizzazione Numeri -->
  <div class="tg-center-display">
    <div class="tg-label-num">Sosta: <span id="val-tgSosta">0</span></div>
    <div class="tg-label-num">Occupati: <span id="val-tg">0</span></div>
  </div>
  
  <!-- Lato Destro: Tasti Occupanti (Verdi) -->
  <div class="tg-side-btns">
    <button class="plus btn-tg-v" onclick="cambia('tg',1)">+1 O</button>
    <button class="minus btn-tg-v" onclick="cambia('tg',-1)">-1 O</button>
  </div>
</div>

<!-- GRIGLIA PERSONE -->
<div class="grid-container">
  
  <!-- FILA 1: ITALIANI -->
  <div class="card">
    <h3>Ita Neg</h3>
    <div class="num" id="val-itaNeg">0</div>
    <div class="btn-container">
      <button class="minus" onclick="cambia('itaNeg',-1)">-1</button>
      <button class="plus" onclick="cambia('itaNeg',1)">+1</button>
    </div>
  </div>

  <div class="card">
    <h3>Ita Pos</h3>
    <div class="num" id="val-itaPos">0</div>
    <div class="btn-container">
      <button class="minus" onclick="cambia('itaPos',-1)">-1</button>
      <button class="plus" onclick="cambia('itaPos',1)">+1</button>
    </div>
  </div>

  <!-- FILA 2: STRANIERI -->
  <div class="card">
    <h3>Stra Pos</h3>
    <div class="num" id="val-straPos">0</div>
    <div class="btn-container">
      <button class="minus" onclick="cambia('straPos',-1)">-1</button>
      <button class="plus" onclick="cambia('straPos',1)">+1</button>
    </div>
  </div>

  <div class="card">
    <h3>Stra Neg</h3>
    <div class="num" id="val-straNeg">0</div>
    <div class="btn-container">
      <button class="minus" onclick="cambia('straNeg',-1)">-1</button>
      <button class="plus" onclick="cambia('straNeg',1)">+1</button>
    </div>
  </div>

</div>

<div class="footer">
  <div class="summary" id="riepilogo"></div>
  <div class="action-btns">
    <button class="copy" onclick="copia()">Copia</button>
    <button class="reset" onclick="azzera()">Azzera</button>
  </div>
</div>

<script>
let dati = JSON.parse(localStorage.getItem("contatore")) || {
  tgSosta: 0, tg: 0, itaNeg: 0, itaPos: 0, straPos: 0, straNeg: 0
};

function salva() {
  localStorage.setItem("contatore", JSON.stringify(dati));
}

function cambia(k, v) {
  dati[k] = Math.max(0, dati[k] + v);
  salva(); 
  aggiornaSchermata();
}

function testo() {
  let righe = [];
  
  if (dati.tgSosta > 0) {
    righe.push(`${dati.tgSosta} tg`);
  }
  
  let dettagliPersone = [];
  if (dati.itaNeg > 0) dettagliPersone.push(`${dati.itaNeg} ita neg`);
  if (dati.itaPos > 0) dettagliPersone.push(`${dati.itaPos} ita pos`);
  if (dati.straPos > 0) dettagliPersone.push(`${dati.straPos} stra pos`);
  if (dati.straNeg > 0) dettagliPersone.push(`${dati.straNeg} stra neg`);
  
  if (dati.tg > 0) {
    let rigaTgCon = `${dati.tg} tg`;
    if (dettagliPersone.length > 0) {
      rigaTgCon += ` con ${dettagliPersone.join(", ")}`;
    }
    righe.push(rigaTgCon);
  } else if (dettagliPersone.length > 0) {
    righe.push(dettagliPersone.join(", "));
  }
  
  return righe.length > 0 ? righe.join("\n") : "Nessun controllo effettuato";
}

function aggiornaSchermata() {
  for (let k in dati) {
    document.getElementById(`val-${k}`).innerText = dati[k];
  }
  document.getElementById("riepilogo").innerText = testo();
}

function copia() {
  const t = testo();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(() => alert("Copiato!")).catch(() => fallbackCopia(t));
  } else {
    fallbackCopia(t);
  }
}

function fallbackCopia(text) {
  const ta = document.createElement("textarea"); ta.value = text; ta.style.style.position = "fixed"; document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); alert("Copiato!"); } catch (err) { alert("Errore copia."); }
  document.body.removeChild(ta);
}

function azzera() {
  if (confirm("Azzerare tutto?")) {
    for (let k in dati) dati[k] = 0;
    salva(); 
    aggiornaSchermata();
  }
}

aggiornaSchermata();
</script>

</body>
</html>
