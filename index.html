<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contatore Posto di Controllo Definitivo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 12px 10px;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
  }
  h2 { margin: 2px 0 8px 0; font-size: 18px; }
  
  /* Blocco Unico Targhe in alto - GIGANTE */
  .top-tg-block {
    background: #2c3e50;
    border-radius: 16px;
    padding: 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    box-sizing: border-box;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    border: 1px solid #34495e;
  }
  .tg-side-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 30%;
  }
  .tg-center-display {
    width: 36%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }
  .tg-label-num {
    font-size: 16px;
    color: #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tg-label-num span {
    font-size: 38px;
    font-weight: bold;
    color: white;
  }

  /* Altezza blindata per i tasti targa */
  .btn-tg-v {
    height: 70px !important; 
    min-height: 70px !important;
    font-size: 24px !important;
    border-radius: 14px;
    font-weight: bold;
  }

  /* GRIGLIA PERSONE FLUIDA E MASSICCIA */
  .flex-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-grow: 1;
    margin-bottom: 12px;
  }
  .flex-row {
    display: flex;
    gap: 12px;
    flex: 1;
  }
  
  .card {
    background: #222;
    border-radius: 14px;
    padding: 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-sizing: border-box;
    border: 1px solid #333;
  }
  
  .card h3 { margin: 0 0 4px 0; font-size: 15px; color: #bbb; }
  .num { font-size: 38px; font-weight: bold; margin: 2px 0; line-height: 1; }
  
  .btn-container {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  
  button {
    border: 0;
    font-weight: bold;
    touch-action: manipulation;
    cursor: pointer;
  }
  
  /* Altezza blindata per i tasti persone */
  .card button {
    font-size: 24px !important;   
    height: 70px !important;      
    min-height: 70px !important;
    border-radius: 14px;
  }
  
  .plus { background: #2ecc71; color: white; flex: 2; }
  .plus-sosta { background: #3498db; color: white; flex: 2; }
  .minus { background: #e74c3c; color: white; flex: 1; }

  /* COMPATTO E COMODO IN BASSO */
  .footer {
    margin-top: 2px;
  }
  .summary { font-size: 16px; background: #000; padding: 14px; border-radius: 12px; word-wrap: break-word; margin-bottom: 12px; min-height: 30px; text-align: left; white-space: pre-line; border: 1px solid #222; }
  .action-btns { display: flex; gap: 12px; }
  .copy { background: #2980b9; color: white; flex: 1; font-size: 20px; padding: 16px; border-radius: 12px; }
  .reset { background: #f39c12; color: white; flex: 1; font-size: 20px; padding: 16px; border-radius: 12px; }
</style>
</head>
<body>

<h2>Posto di Controllo</h2>

<div class="top-tg-block">
  <div class="tg-side-btns">
    <button class="plus-sosta btn-tg-v" onclick="cambia('tgSosta',1)">+1 S</button>
    <button class="minus btn-tg-v" onclick="cambia('tgSosta',-1)">-1 S</button>
  </div>
  <div class="tg-center-display">
    <div class="tg-label-num">Sosta: <span id="val-tgSosta">0</span></div>
    <div class="tg-label-num">Occupati: <span id="val-tg">0</span></div>
  </div>
  <div class="tg-side-btns">
    <button class="plus btn-tg-v" onclick="cambia('tg',1)">+1 O</button>
    <button class="minus btn-tg-v" onclick="cambia('tg',-1)">-1 O</button>
  </div>
</div>

<div class="flex-grid">
  <div class="flex-row">
    <div class="card">
      <h3>Ita Neg</h3>
      <div class="num" id="val-itaNeg">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('itaNeg',-1)">-1</button>
        <button class="plus" onclick="cambia('itaNeg',1)">+1</button>
      </div>
    </div>
    <div class="card">
      <h3>Ita Pos</h3>
      <div class="num" id="val-itaPos">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('itaPos',-1)">-1</button>
        <button class="plus" onclick="cambia('itaPos',1)">+1</button>
      </div>
    </div>
  </div>
  
  <div class="flex-row">
    <div class="card">
      <h3>Stra Pos</h3>
      <div class="num" id="val-straPos">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('straPos',-1)">-1</button>
        <button class="plus" onclick="cambia('straPos',1)">+1</button>
      </div>
    </div>
    <div class="card">
      <h3>Stra Neg</h3>
      <div class="num" id="val-straNeg">0</div>
      <div class="btn-container">
        <button class="minus" onclick="cambia('straNeg',-1)">-1</button>
        <button class="plus" onclick="cambia('straNeg',1)">+1</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="summary" id="riepilogo"></div>
  <div class="action-btns">
    <button class="copy" onclick="copia()">Copia</button>
    <button class="reset" onclick="azzera()">Azzera</button>
  </div>
</div>

<script>
let datiSalvati = JSON.parse(localStorage.getItem("contatore")) || {};
let dati = {
  tgSosta: Number(datiSalvati.tgSosta) || 0,
  tg: Number(datiSalvati.tg) || 0,
  itaNeg: Number(datiSalvati.itaNeg) || 0,
  itaPos: Number(datiSalvati.itaPos) || 0,
  straPos: Number(datiSalvati.straPos) || 0,
  straNeg: Number(datiSalvati.straNeg) || 0
};

function riproduciSuono() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.03);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.03);
  } catch (e) {}
}

function salva() {
  localStorage.setItem("contatore", JSON.stringify(dati));
}

function cambia(k, v) {
  riproduciSuono();
  dati[k] = Math.max(0, dati[k] + v);
  salva(); 
  aggiornaSchermata();
}

function testo() {
  let righe = [];
  if (dati.tgSosta > 0) righe.push(`${dati.tgSosta} tg`);
  let dettagliPersone = [];
  if (dati.itaNeg > 0) dettagliPersone.push(`${dati.itaNeg} ita neg`);
  if (dati.itaPos > 0) dettagliPersone.push(`${dati.itaPos} ita pos`);
  if (dati.straPos > 0) dettagliPersone.push(`${dati.straPos} stra pos`);
  if (dati.straNeg > 0) dettagliPersone.push(`${dati.straNeg} stra neg`);
  
  if (dati.tg > 0) {
    let rigaTgCon = `${dati.tg} tg`;
    if (dettagliPersone.length > 0) rigaTgCon += ` con ${dettagliPersone.join(", ")}`;
    righe.push(rigaTgCon);
  } else if (dettagliPersone.length > 0) {
    righe.push(dettagliPersone.join(", "));
  }
  return righe.length > 0 ? righe.join("\n") : "Nessun controllo effettuato";
}

function aggiornaSchermata() {
  for (let k in dati) {
    let el = document.getElementById(`val-${k}`);
    if(el) el.innerText = dati[k];
  }
  document.getElementById("riepilogo").innerText = testo();
}

function copia() {
  riproduciSuono();
  const t = testo();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(t).then(() => alert("Copiato!")).catch(() => fallbackCopia(t));
  } else { fallbackCopia(t); }
}

function fallbackCopia(text) {
  const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); alert("Copiato!"); } catch (err) { alert("Errore copia."); }
  document.body.removeChild(ta);
}

function azzera() {
  riproduciSuono();
  if (confirm("Azzerare tutto?")) {
    for (let k in dati) dati[k] = 0;
    salva(); 
    aggiornaSchermata();
  }
}
aggiornaSchermata();
</script>
</body>
</html>
